<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      background: #fff;
      color: #000;
    }

    .header {
      background: #000;
      color: #fff;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-badge {
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 1.5px solid #fff;
    }

    .status-badge.connected {
      background: #fff;
      color: #000;
    }

    .content {
      padding: 12px 16px;
    }

    .section {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 2px solid #000;
    }

    .section:last-child {
      border-bottom: none;
    }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 6px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 11px;
    }

    .info-label {
      font-weight: 700;
      text-transform: uppercase;
    }

    .info-value {
      color: #555;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 2px solid #000;
      background: #fff;
      color: #000;
      cursor: pointer;
      margin-bottom: 6px;
      box-shadow: 3px 3px 0 #000;
    }

    .btn:hover {
      background: #000;
      color: #fff;
    }

    .btn:active {
      box-shadow: 1px 1px 0 #000;
      transform: translate(2px, 2px);
    }

    .log {
      max-height: 120px;
      overflow-y: auto;
      font-size: 10px;
      background: #f5f5f5;
      padding: 6px;
      border: 1px solid #000;
    }

    .log-entry {
      padding: 2px 0;
      border-bottom: 1px solid #e5e5e5;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>PC Agent</span>
    <span id="statusBadge" class="status-badge">OFFLINE</span>
  </div>

  <div class="content">
    <div class="section">
      <div class="section-title">Current Page</div>
      <div class="info-row">
        <span class="info-label">URL</span>
        <span class="info-value" id="pageUrl">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">Title</span>
        <span class="info-value" id="pageTitle">-</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Actions</div>
      <button class="btn" id="btnReport">Report Page Info</button>
      <button class="btn" id="btnRefresh">Refresh Status</button>
    </div>

    <div class="section">
      <div class="section-title">Recent Activity</div>
      <div class="log" id="activityLog">
        <div class="log-entry">Waiting...</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
